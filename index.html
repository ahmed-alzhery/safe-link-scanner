<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>درع الرقمي | فحص الروابط</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🛡️ درع الرقمي</h1>
        <p class="subtitle">خدمة أمنية لفحص الروابط المشبوهة</p>

        <div class="search-box">
            <input type="text" id="urlInput" placeholder="أدخل الرابط للفحص...">
            <button onclick="startScan()" id="scanBtn">فحص</button>
        </div>

        <div id="resultCard" class="result-card">
            <h3 id="resTitle"></h3>
            <p id="resDesc"></p>
            <div id="stats" style="margin-top:10px; font-weight:bold;"></div>
        </div>

        <div class="footer">
            <div class="dev-info">تم التطوير بكل فخر بواسطة <b>أحمد حسن</b></div>
            <a href="https://web.telegram.org/a/" target="_blank" class="telegram-btn">
                ✈️ تابعني على تليجرام
            </a>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
